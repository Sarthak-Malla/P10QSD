# Global configuration
seed: 42

# Data configuration
data:
  tickers_file: "sp500_50.txt"
  start_date: "2015-01-01"
  end_date: "2024-12-31"
  raw_dir: "data/raw"
  processed_dir: "data/processed"

# Feature configuration
features:
  prediction_horizon: 5  # days after filing to measure return

# Model configuration
model:
  type: "random_forest"
  params:
    n_estimators: 200
    max_depth: 5
    min_samples_split: 10

# Training configuration
training:
  test_size: 0.2
  split_type: "time_series"

sec:
  identity: "sarthak.malla@mbzuai.ac.ae"
  forms: ["10-Q"]
  sections: ["Item 1A"]